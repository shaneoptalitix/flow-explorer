<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Environments & Deployments Explorer</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

            .accordion-content.active {
                max-height: 2000px;
                transition: max-height 0.5s ease-in;
            }

        .historical-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

            .historical-accordion-content.active {
                max-height: 3000px;
                transition: max-height 0.5s ease-in;
            }

        .branches-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

            .branches-accordion-content.active {
                max-height: 4000px;
                transition: max-height 0.5s ease-in;
            }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }

            .modal.active {
                display: flex;
                align-items: center;
                justify-content: center;
            }

        .modal-content {
            background-color: #fefefe;
            margin: auto;
            padding: 0;
            border-radius: 8px;
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .highlight {
            background-color: #fef08a;
            padding: 2px 4px;
            border-radius: 2px;
        }

        .selectable-deployment {
            cursor: pointer;
            transition: all 0.2s;
        }

            .selectable-deployment:hover {
                border-color: #3b82f6 !important;
                box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
            }

            .selectable-deployment.selected {
                border-color: #3b82f6 !important;
                background-color: #eff6ff !important;
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            }

        .comparison-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 10;
            pointer-events: none;
        }

        .no-select-propagation {
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-blue-600 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <i class="fab text-white text-3xl">
                        <img src="/img/optalitix-logo.png" width="50px" />
                    </i>
                    <h1 class="text-3xl font-bold text-white">Flow Environments & Deployments Explorer</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="text-sm text-white" id="lastUpdated"></div>
                    <button onclick="loadDeployments()" class="bg-white text-blue-600 px-6 py-2 rounded-lg font-semibold hover:bg-blue-50 transition-colors flex items-center space-x-2">
                        <i class="fas fa-sync-alt" id="refreshIcon"></i>
                        <span>Refresh</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Compare Mode Banner -->
    <div id="compareBanner" class="hidden bg-gradient-to-r from-purple-600 to-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-code-compare text-2xl"></i>
                    <div>
                        <div class="font-bold text-lg">Comparison Mode</div>
                        <div class="text-sm" id="compareStatus">Select two releases to compare</div>
                    </div>
                </div>
                <div class="flex items-center space-x-3">
                    <button id="compareButton" onclick="performComparison()" disabled class="bg-white text-purple-600 px-6 py-2 rounded-lg font-semibold hover:bg-purple-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fas fa-random mr-2"></i>Compare
                    </button>
                    <button onclick="exitCompareMode()" class="bg-red-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-red-600 transition-colors">
                        <i class="fas fa-times mr-2"></i>Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Filters Card -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Filters & Sorting</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Environment Name</label>
                    <input type="text" id="environmentFilter" placeholder="Filter by name..."
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Page Size</label>
                    <select id="pageSize" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sort By</label>
                    <select id="sortBy" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="deploymentFinishTime" selected>Deployment Date</option>
                        <option value="buildStartTime">Build Date</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Sort Order</label>
                    <select id="sortOrder" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="desc" selected>Newest First</option>
                        <option value="asc">Oldest First</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex gap-3">
                <button onclick="loadDeployments()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                    Apply Filters
                </button>
                <button onclick="enterCompareMode()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-purple-700 transition-colors">
                    <i class="fas fa-code-compare mr-2"></i>Compare Releases
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="p-3 bg-blue-100 rounded-lg">
                        <i class="fas fa-database text-blue-600 text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-600">Total Deployments</p>
                        <p class="text-2xl font-bold text-gray-800" id="totalCount">-</p>
                    </div>
                </div>
                <div class="text-sm text-gray-500" id="lastUpdated"></div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden">
            <div class="bg-white rounded-lg shadow-md p-12 text-center">
                <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mx-auto mb-4"></div>
                <p class="text-gray-600 text-lg">Loading deployments...</p>
            </div>
        </div>

        <!-- Error State -->
        <div id="errorState" class="hidden">
            <div class="bg-red-50 border-l-4 border-red-500 rounded-lg p-6">
                <div class="flex items-start">
                    <i class="fas fa-exclamation-circle text-red-500 text-2xl mt-1"></i>
                    <div class="ml-4">
                        <h3 class="text-lg font-semibold text-red-800">Error</h3>
                        <p class="text-red-700 mt-1" id="errorMessage"></p>
                        <button onclick="loadDeployments()" class="mt-4 bg-red-100 text-red-800 px-4 py-2 rounded-lg hover:bg-red-200 transition-colors">
                            Try Again
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Deployments List -->
        <div id="deploymentsContainer" class="space-y-4">
            <!-- Deployments will be loaded here -->
        </div>

        <!-- Pagination -->
        <div id="paginationContainer" class="mt-6">
            <!-- Pagination will be loaded here -->
        </div>
    </div>

    <!-- Commits Modal -->
    <div id="commitsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                    <i class="fab fa-bitbucket text-blue-600 mr-3"></i>
                    <span id="modalBranchName">Branch Commits</span>
                </h2>
                <button onclick="closeCommitsModal()" class="text-gray-500 hover:text-gray-700 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- Loading State -->
                <div id="commitsLoadingState" class="hidden text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mx-auto mb-4"></div>
                    <p class="text-gray-600" id="loadingMessage">Loading commits...</p>
                </div>

                <!-- Error State -->
                <div id="commitsErrorState" class="hidden">
                    <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                        <i class="fas fa-exclamation-circle text-red-500 text-2xl mb-2"></i>
                        <p class="text-red-700" id="commitsErrorMessage"></p>
                    </div>
                </div>

                <!-- Commits List -->
                <div id="commitsListContainer" class="space-y-3">
                    <!-- Commits will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <div id="commitsInfo" class="text-sm text-gray-600"></div>
                <button id="loadMoreCommitsBtn" onclick="loadMoreCommits()" class="hidden bg-blue-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                    <i class="fas fa-arrow-down mr-2"></i>Load More Commits
                </button>
            </div>
        </div>
    </div>

    <!-- Comparison Modal -->
    <div id="comparisonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                    <i class="fas fa-code-compare text-purple-600 mr-3"></i>
                    <span id="comparisonModalTitle">Commit Comparison</span>
                </h2>
                <button onclick="closeComparisonModal()" class="text-gray-500 hover:text-gray-700 text-2xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- Loading State -->
                <div id="comparisonLoadingState" class="hidden text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-purple-600 mx-auto mb-4"></div>
                    <p class="text-gray-600">Comparing commits...</p>
                </div>

                <!-- Error State -->
                <div id="comparisonErrorState" class="hidden">
                    <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                        <i class="fas fa-exclamation-circle text-red-500 text-2xl mb-2"></i>
                        <p class="text-red-700" id="comparisonErrorMessage"></p>
                    </div>
                </div>

                <!-- Comparison Info -->
                <div id="comparisonInfo" class="hidden mb-6">
                    <div class="grid grid-cols-2 gap-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                        <div>
                            <p class="text-xs text-gray-600 uppercase tracking-wide mb-1">From (Older)</p>
                            <p class="font-mono text-sm text-gray-800" id="fromCommitInfo"></p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-600 uppercase tracking-wide mb-1">To (Newer)</p>
                            <p class="font-mono text-sm text-gray-800" id="toCommitInfo"></p>
                        </div>
                    </div>
                </div>

                <!-- Comparison Results -->
                <div id="comparisonResults" class="space-y-3">
                    <!-- Results will be loaded here -->
                </div>
            </div>
            <div class="modal-footer">
                <div id="comparisonCommitsInfo" class="text-sm text-gray-600"></div>
                <button onclick="closeComparisonModal()" class="bg-gray-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-gray-700 transition-colors">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Configuration - Update these values
        //const API_BASE_URL = 'https://localhost:8443'; // when local
        const API_BASE_URL = 'https://azuredevopsbuildsapi-cdadgzh8cwesccgx.uksouth-01.azurewebsites.net'; // when publishing
        const ORGANIZATION_NAME = 'OptalitixLimited';
        const PROJECT_NAME = 'Flow';

        let currentPage = 1;
        let totalPages = 1;
        const branchesCache = {};
        const branchesLoadedForEnvironment = {};

        // Commits modal state
        let currentBranchForCommits = '';
        let currentCommitsPage = 1;
        let allCommits = [];
        let hasMoreCommits = false;
        let nextPageUrl = null;

        // Comparison mode state
        let isCompareMode = false;
        let selectedDeployments = [];
        let allDeployments = [];

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Enter compare mode
        function enterCompareMode() {
            isCompareMode = true;
            selectedDeployments = [];
            document.getElementById('compareBanner').classList.remove('hidden');
            updateCompareStatus();

            // Add selectable class and attach event listeners
            document.querySelectorAll('.deployment-card').forEach(card => {
                card.classList.add('selectable-deployment');
            });
        }

        // Exit compare mode
        function exitCompareMode() {
            isCompareMode = false;
            selectedDeployments = [];
            document.getElementById('compareBanner').classList.add('hidden');

            // Remove selection styling
            document.querySelectorAll('.deployment-card').forEach(card => {
                card.classList.remove('selectable-deployment', 'selected');
                const badge = card.querySelector('.comparison-badge');
                if (badge) badge.remove();
            });
        }

        // Setup click handlers after deployments are rendered
        function setupDeploymentClickHandlers() {
            const container = document.getElementById('deploymentsContainer');

            // Remove old listener if exists
            const newContainer = container.cloneNode(true);
            container.parentNode.replaceChild(newContainer, container);

            // Add single delegated event listener
            newContainer.addEventListener('click', function (event) {
                if (!isCompareMode) return;

                // Find the deployment card that was clicked
                let cardElement = event.target;

                // Check if click was on an interactive element that should NOT trigger selection
                if (event.target.closest('button, a, input, select, textarea')) {
                    return; // Don't select if clicking on interactive elements
                }

                // Traverse up to find the deployment card
                while (cardElement && !cardElement.classList.contains('deployment-card')) {
                    cardElement = cardElement.parentElement;
                }

                if (!cardElement) return;

                // Get the deployment index from data attribute
                const deploymentIndex = parseInt(cardElement.getAttribute('data-deployment-index'));
                if (isNaN(deploymentIndex)) return;

                toggleDeploymentSelection(deploymentIndex, cardElement);
            });
        }

        // Toggle deployment selection
        function toggleDeploymentSelection(deploymentIndex, cardElement) {
            if (!isCompareMode) return;

            const deployment = allDeployments[deploymentIndex];
            if (!deployment) return;

            const existingIndex = selectedDeployments.findIndex(d => d.environmentId === deployment.environmentId);

            if (existingIndex >= 0) {
                // Deselect
                selectedDeployments.splice(existingIndex, 1);
                cardElement.classList.remove('selected');
                const badge = cardElement.querySelector('.comparison-badge');
                if (badge) badge.remove();
            } else {
                // Select (max 2)
                if (selectedDeployments.length >= 2) {
                    alert('You can only compare 2 releases at a time. Please deselect one first.');
                    return;
                }
                selectedDeployments.push(deployment);
                cardElement.classList.add('selected');

                // Add badge
                const badge = document.createElement('div');
                badge.className = 'comparison-badge bg-purple-600 text-white';
                badge.textContent = selectedDeployments.length === 1 ? 'Release 1' : 'Release 2';
                cardElement.appendChild(badge);
            }

            updateCompareStatus();
        }

        // Update compare status
        function updateCompareStatus() {
            const statusText = document.getElementById('compareStatus');
            const compareBtn = document.getElementById('compareButton');

            if (selectedDeployments.length === 0) {
                statusText.textContent = 'Select two releases to compare';
                compareBtn.disabled = true;
            } else if (selectedDeployments.length === 1) {
                statusText.textContent = `Selected: ${selectedDeployments[0].environmentName} - Select one more`;
                compareBtn.disabled = true;
            } else {
                statusText.textContent = `Ready to compare: ${selectedDeployments[0].environmentName} vs ${selectedDeployments[1].environmentName}`;
                compareBtn.disabled = false;
            }
        }

        // Perform comparison
        async function performComparison() {
            if (selectedDeployments.length !== 2) {
                alert('Please select exactly 2 releases to compare');
                return;
            }

            const deployment1 = selectedDeployments[0];
            const deployment2 = selectedDeployments[1];

            if (!deployment1.buildSourceVersion || !deployment2.buildSourceVersion) {
                alert('Both selected releases must have valid source versions');
                return;
            }

            const olderDeployment = deployment1;
            const newerDeployment = deployment2;

            openComparisonModal(olderDeployment, newerDeployment);
        }

        // Open comparison modal
        async function openComparisonModal(fromDeployment, toDeployment) {
            const modal = document.getElementById('comparisonModal');
            const loadingState = document.getElementById('comparisonLoadingState');
            const errorState = document.getElementById('comparisonErrorState');
            const resultsContainer = document.getElementById('comparisonResults');
            const infoSection = document.getElementById('comparisonInfo');

            modal.classList.add('active');
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            infoSection.classList.add('hidden');
            resultsContainer.innerHTML = '';

            document.getElementById('fromCommitInfo').textContent =
                `${fromDeployment.environmentName} - ${fromDeployment.buildSourceVersion?.substring(0, 7)}`;
            document.getElementById('toCommitInfo').textContent =
                `${toDeployment.environmentName} - ${toDeployment.buildSourceVersion?.substring(0, 7)}`;

            try {
                const url = `${API_BASE_URL}/api/Bitbucket/compare?fromCommit=${encodeURIComponent(fromDeployment.buildSourceVersion)}&toCommit=${encodeURIComponent(toDeployment.buildSourceVersion)}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                infoSection.classList.remove('hidden');

                if (data.errorMessage) {
                    document.getElementById('comparisonErrorMessage').textContent = data.errorMessage;
                    errorState.classList.remove('hidden');
                } else if (data.commits && data.commits.length > 0) {
                    resultsContainer.innerHTML = data.commits.map(commit => createCommitItem(commit)).join('');
                    document.getElementById('comparisonCommitsInfo').textContent =
                        `Found ${data.totalCommits} commit${data.totalCommits !== 1 ? 's' : ''} between these releases`;
                } else {
                    resultsContainer.innerHTML = `
                            <div class="bg-gray-50 border border-gray-200 rounded-lg p-8 text-center">
                                <i class="fas fa-equals text-gray-400 text-3xl mb-2"></i>
                                <p class="text-gray-600">No commits found between these releases</p>
                            </div>
                        `;
                }

            } catch (error) {
                console.error('Error comparing commits:', error);
                document.getElementById('comparisonErrorMessage').textContent = error.message;
                errorState.classList.remove('hidden');
            } finally {
                loadingState.classList.add('hidden');
            }
        }

        // Close comparison modal
        function closeComparisonModal() {
            const modal = document.getElementById('comparisonModal');
            modal.classList.remove('active');
            exitCompareMode();
        }

        // Helper function to create a Bitbucket branch link
        function createBranchLink(branchName, showCommitsLink = false) {
            if (!branchName || branchName === 'N/A') {
                return `<span class="font-mono text-sm text-gray-600">N/A</span>`;
            }

            const cleanBranchName = branchName.replace(/^refs\/heads\//, '');
            const encodedBranch = encodeURIComponent(cleanBranchName);

            let html = `<a href="https://bitbucket.org/Optalitix/optalitix.framework/branch/${encodedBranch}"
                    target="_blank" rel="noopener noreferrer"
                    class="text-blue-600 hover:text-blue-800 font-mono text-sm flex items-center break-all">
                    ${escapeHtml(cleanBranchName)}
                    <i class="fas fa-external-link-alt ml-2 text-xs flex-shrink-0"></i>
                </a>`;

            if (showCommitsLink) {
                html += `<a href="javascript:void(0)" onclick="openCommitsModal('${escapeHtml(branchName)}')"
                        class="text-purple-600 hover:text-purple-800 text-xs flex items-center mt-1">
                        <i class="fab fa-bitbucket mr-1"></i>View Commits
                    </a>`;
            }

            return html;
        }

        // Open commits modal
        async function openCommitsModal(branchName) {
            currentBranchForCommits = branchName;
            currentCommitsPage = 1;
            allCommits = [];
            hasMoreCommits = false;
            nextPageUrl = null;

            const modal = document.getElementById('commitsModal');
            const modalBranchName = document.getElementById('modalBranchName');
            const cleanBranchName = branchName.replace(/^refs\/heads\//, '');

            modalBranchName.textContent = `Commits for ${cleanBranchName}`;
            modal.classList.add('active');

            await loadCommitsForBranch(branchName, true);
        }

        // Close commits modal
        function closeCommitsModal() {
            const modal = document.getElementById('commitsModal');
            modal.classList.remove('active');
            document.getElementById('commitsListContainer').innerHTML = '';
        }

        // Load commits for a branch
        async function loadCommitsForBranch(branchName, isFirstLoad = false) {
            const loadingState = document.getElementById('commitsLoadingState');
            const errorState = document.getElementById('commitsErrorState');
            const commitsContainer = document.getElementById('commitsListContainer');
            const loadMoreBtn = document.getElementById('loadMoreCommitsBtn');
            const commitsInfo = document.getElementById('commitsInfo');
            const loadingMessage = document.getElementById('loadingMessage');

            if (isFirstLoad) {
                commitsContainer.innerHTML = '';
                loadingState.classList.remove('hidden');
                errorState.classList.add('hidden');
                loadMoreBtn.classList.add('hidden');
                loadingMessage.textContent = 'Loading commits...';
            } else {
                loadMoreBtn.disabled = true;
                loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Loading...';
            }

            try {
                const cleanBranchName = branchName.replace(/^refs\/heads\//, '');
                const encodedBranch = encodeURIComponent(cleanBranchName);
                const url = `${API_BASE_URL}/api/Bitbucket/commits/${encodedBranch}?pageLength=100&maxPages=1`;

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                allCommits = allCommits.concat(data.commits);
                hasMoreCommits = data.hasMorePages;
                nextPageUrl = data.nextPageUrl;
                currentCommitsPage++;

                commitsContainer.innerHTML = allCommits.map(commit => createCommitItem(commit)).join('');
                commitsInfo.textContent = `Showing ${allCommits.length} commits`;

                if (hasMoreCommits) {
                    loadMoreBtn.classList.remove('hidden');
                    loadMoreBtn.disabled = false;
                    loadMoreBtn.innerHTML = '<i class="fas fa-arrow-down mr-2"></i>Load More Commits';
                } else {
                    loadMoreBtn.classList.add('hidden');
                }

            } catch (error) {
                console.error('Error loading commits:', error);
                document.getElementById('commitsErrorMessage').textContent = error.message;
                errorState.classList.remove('hidden');
                loadMoreBtn.classList.add('hidden');
            } finally {
                loadingState.classList.add('hidden');
            }
        }

        // Load more commits
        async function loadMoreCommits() {
            if (currentBranchForCommits && hasMoreCommits) {
                await loadCommitsForBranch(currentBranchForCommits, false);
            }

        // Toggle branches accordion
        async function toggleBranchesAccordion(environmentId, definitionId) {
            const content = document.getElementById(`branches-accordion-${environmentId}`);
            const icon = document.getElementById(`branches-icon-${environmentId}`);
            const loadingIndicator = document.getElementById(`branches-loading-${environmentId}`);
            const branchesContent = document.getElementById(`branches-content-${environmentId}`);
            const branchesCount = document.getElementById(`branches-count-${environmentId}`);

            if (content.classList.contains('active')) {
                content.classList.remove('active');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            } else {
                content.classList.add('active');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');

                if (branchesLoadedForEnvironment[environmentId]) {
                    return;
                }

                if (branchesCache[definitionId]) {
                    const branches = branchesCache[definitionId];
                    branchesContent.innerHTML = createBranchesHTML(branches);
                    if (branches && branches.length > 0) {
                        branchesCount.textContent = `(${branches.length})`;
                    }
                    branchesLoadedForEnvironment[environmentId] = true;
                } else {
                    loadingIndicator.classList.remove('hidden');
                    try {
                        const branches = await loadBranches(definitionId);
                        branchesCache[definitionId] = branches;
                        branchesContent.innerHTML = createBranchesHTML(branches);
                        if (branches && branches.length > 0) {
                            branchesCount.textContent = `(${branches.length})`;
                        }
                        branchesLoadedForEnvironment[environmentId] = true;
                    } catch (error) {
                        branchesContent.innerHTML = `
                                <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                                    <i class="fas fa-exclamation-circle text-red-500 mb-2"></i>
                                    <p class="text-red-700 text-sm">Failed to load branches: ${escapeHtml(error.message)}</p>
                                </div>
                            `;
                        branchesLoadedForEnvironment[environmentId] = true;
                    } finally {
                        loadingIndicator.classList.add('hidden');
                    }
                }
            }
        }

        // Load branches from API
        async function loadBranches(definitionId) {
            const url = `${API_BASE_URL}/api/Pipeline/${definitionId}/branches`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`API returned ${response.status}: ${response.statusText}`);
            }

            return await response.json();

        // Copy to clipboard function
        function copyToClipboard(text, buttonId) {
            navigator.clipboard.writeText(text).then(() => {
                const button = document.getElementById(buttonId);
                const icon = button.querySelector('i');
                const originalClass = icon.className;

                icon.className = 'fas fa-check text-green-600';

                setTimeout(() => {
                    icon.className = originalClass;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

            // Check for Kubernetes.HttpRoute.Hostname
            if (variables['Kubernetes.HttpRoute.Hostname'] && variables['Kubernetes.HttpRoute.Hostname'] !== '[HIDDEN]') {

                links.push({

                links.push({
                    label: 'Load Balancer',
                    url: `https://${domain}`,
                    icon: 'fa-network-wired'
                });

            // Check for ServiceInfo.PortalUrl
            if (variables['ServiceInfo.PortalUrl'] && variables['ServiceInfo.PortalUrl'] !== '[HIDDEN]') {

                            ${historicalHtml}

                            <button onclick="toggleAccordion(${deployment.environmentId})"
                                    class="w-full flex items-center justify-between px-4 py-3 bg-gray-50 hover:bg-gray-100 rounded-lg transition-colors">
                                <span class="font-medium text-gray-700 flex items-center">
                                    <i class="fas fa-cog mr-2 text-blue-600"></i>
                                    Variables (${variableCount})
                                </span>
                                <i class="fas fa-chevron-down text-gray-500" id="icon-${deployment.environmentId}"></i>
                            </button>

                            <div id="accordion-${deployment.environmentId}" class="accordion-content mt-4">
                                ${variablesHtml}
                            </div>
                        </div>
                    </div>
                `;
        }

        // Create pagination
        function createPagination(data) {
            if (data.totalPages <= 1) return '';

            let html = `
                    <div class="bg-white rounded-lg shadow-md p-4 flex items-center justify-between">
                        <div class="text-sm text-gray-600">
                            Page ${data.pageNumber} of ${data.totalPages} (${data.totalCount} total)
                        </div>
                        <div class="flex space-x-2">
                `;

            html += `
                    <button onclick="loadPage(${data.pageNumber - 1})"
                            ${!data.hasPreviousPage ? 'disabled' : ''}
                            class="px-4 py-2 rounded-lg border ${data.hasPreviousPage ? 'border-gray-300 bg-white hover:bg-gray-50 text-gray-700' : 'border-gray-200 bg-gray-100 text-gray-400 cursor-not-allowed'}">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                `;

            const startPage = Math.max(1, data.pageNumber - 2);
            const endPage = Math.min(data.totalPages, data.pageNumber + 2);

            for (let i = startPage; i <= endPage; i++) {
                const isActive = i === data.pageNumber;
                html += `
                        <button onclick="loadPage(${i})"
                                class="px-4 py-2 rounded-lg ${isActive ? 'bg-blue-600 text-white' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}">
                            ${i}
                        </button>
                    `;
            }

            html += `
                    <button onclick="loadPage(${data.pageNumber + 1})"
                            ${!data.hasNextPage ? 'disabled' : ''}
                            class="px-4 py-2 rounded-lg border ${data.hasNextPage ? 'border-gray-300 bg-white hover:bg-gray-50 text-gray-700' : 'border-gray-200 bg-gray-100 text-gray-400 cursor-not-allowed'}">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                `;

            html += `
                        </div>
                    </div>
                `;

            return html;
        }

        // Load deployments
        async function loadDeployments() {
            const environmentFilter = document.getElementById('environmentFilter').value;
            const pageSize = document.getElementById('pageSize').value;
            const sortBy = document.getElementById('sortBy').value;
            const sortOrder = document.getElementById('sortOrder').value;

            Object.keys(branchesCache).forEach(key => delete branchesCache[key]);
            Object.keys(branchesLoadedForEnvironment).forEach(key => delete branchesLoadedForEnvironment[key]);

            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('errorState').classList.add('hidden');
            document.getElementById('deploymentsContainer').innerHTML = '';
            document.getElementById('refreshIcon').classList.add('animate-spin');

            try {
                const params = new URLSearchParams({
                    pageNumber: currentPage,
                    pageSize: pageSize,
                    includeVariableGroups: true,
                    sortBy: sortBy,
                    sortOrder: sortOrder
                });

                if (environmentFilter) {
                    params.append('environmentName', environmentFilter);
                }

                const url = `${API_BASE_URL}/api/EnvironmentReport?${params.toString()}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                allDeployments = data.data;

                document.getElementById('totalCount').textContent = data.totalCount;
                document.getElementById('lastUpdated').textContent = `Updated: ${formatDate(new Date())}`;

                totalPages = data.totalPages;

                if (data.data && data.data.length > 0) {
                    document.getElementById('deploymentsContainer').innerHTML =
                        data.data.map((d, index) => createDeploymentItem(d, index)).join('');

                    // Setup event handlers AFTER rendering
                    setupDeploymentClickHandlers();
                } else {
                    document.getElementById('deploymentsContainer').innerHTML = `
                            <div class="bg-white rounded-lg shadow-md p-12 text-center">
                                <i class="fas fa-inbox text-gray-400 text-5xl mb-4"></i>
                                <h3 class="text-xl font-semibold text-gray-800 mb-2">No deployments found</h3>
                                <p class="text-gray-600">Try adjusting your filters</p>
                            </div>
                        `;
                }

                document.getElementById('paginationContainer').innerHTML = createPagination(data);

            } catch (error) {
                document.getElementById('errorState').classList.remove('hidden');
                document.getElementById('errorMessage').textContent = error.message;
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('refreshIcon').classList.remove('animate-spin');
            }
        }

        // Load specific page
        function loadPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadDeployments();
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const commitsModal = document.getElementById('commitsModal');
            const comparisonModal = document.getElementById('comparisonModal');

            if (event.target === commitsModal) {
                closeCommitsModal();
            }

            if (event.target === comparisonModal) {
                closeComparisonModal();
            }
        }

        // Load on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadDeployments();
        });
    </script>
</body>
</html>
